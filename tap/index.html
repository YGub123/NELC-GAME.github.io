<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tap! · NeuroEcho</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.1.0/css/all.min.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=ZCOOL+KuaiLe&family=JetBrains+Mono:wght@400;700&display=swap');
    :root{--bg:#f3ead7;--card:rgba(255,252,244,0.95);--text:#5a4e42;--text-dim:#8b7a6b;--accent:#ed8941;--accent-glow:rgba(237,137,65,0.25);--brown:#8b6a52;--pink:#ff6b9d;--blue:#4fc3f7;--green:#66bb6a;--yellow:#ffd54f;--zone-border:rgba(139,106,82,0.3);--overlay-bg:rgba(243,234,215,0.95);--back-bg:rgba(255,252,244,0.9);--back-border:rgba(176,120,83,0.2);--stat-bg:rgba(139,106,82,0.08)}
    [data-theme="dark"]{--bg:#1a1612;--card:rgba(38,32,26,0.95);--text:#d4c8b8;--text-dim:#9e8e7d;--accent:#f0a060;--accent-glow:rgba(240,160,96,0.25);--brown:#b89a7a;--pink:#ff8ab5;--blue:#64b5f6;--green:#81c784;--yellow:#ffe082;--zone-border:rgba(176,120,83,0.2);--overlay-bg:rgba(26,22,18,0.95);--back-bg:rgba(38,32,26,0.9);--back-border:rgba(176,120,83,0.15);--stat-bg:rgba(176,120,83,0.08)}
    *{margin:0;padding:0;box-sizing:border-box}*, *::before, *::after { cursor: none !important; }
    body{background-color:var(--bg);background-image:url("../image/background.webp");background-size:cover;background-position:center;background-attachment:fixed;font-family:'Noto Serif SC',serif;color:var(--text);min-height:100vh;animation:pageFade .4s ease;cursor: none;overflow-x:hidden}
    @keyframes pageFade{from{opacity:0}to{opacity:1}}
    @keyframes cardUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

    .container{max-width:900px;margin:0 auto;padding:20px 20px 60px}
    .loading{text-align:center;padding:80px 0;color:var(--text-dim);font-size:1.1rem}
    .loading i{margin-right:8px;color:var(--accent)}

    .stat-label{color:var(--text-dim)}.stat-value{color:var(--brown);font-weight:700}
    .empty-state{text-align:center;padding:80px 0;color:var(--text-dim)}

    .song-group{margin-bottom:6px;animation:cardUp .5s ease backwards;overflow:visible}
    .sg-card{display:flex;border-radius:8px;overflow:hidden;cursor:pointer;position:relative;height:100px;transition:transform .15s;box-shadow:0 2px 12px rgba(0,0,0,.12)}
    .sg-card:hover{transform:scale(1.02)}.sg-card:active{transform:scale(0.99)}
    .sg-card.selected .sg-body{background:rgba(255,255,255,0.95)!important}
    .sg-card.selected .sg-title{color:#333;text-shadow:none}.sg-card.selected .sg-sub{color:#666}
    .sg-card.selected .sg-diff-name{color:#444;text-shadow:none}
    .sg-card.selected .star-full{color:rgba(0,0,0,.7)}.sg-card.selected .star-partial{color:rgba(0,0,0,.15)}
    .sg-card.selected .star-partial-fill{color:rgba(0,0,0,.7)}.sg-card.selected .star-empty{color:rgba(0,0,0,.12)}

    .sg-diff-name{font-size:.88rem;font-weight:700;color:#fff;margin-top:2px;font-family:'ZCOOL KuaiLe',sans-serif;text-shadow:0 1px 2px rgba(0,0,0,.3)}
    .sg-stars{display:flex;align-items:center;gap:0;margin-top:3px;font-size:.8rem}
    .sg-arrow{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.4);font-size:.65rem;transition:transform .3s}
    .sg-arrow.open{transform:translateY(-50%) rotate(180deg)}
    .sg-multi .sg-body{background:rgba(190,50,130,0.75)}
    .sg-single .sg-body{background:rgba(60,120,200,0.8)}
    .diff-list{max-height:0;opacity:0;overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1),opacity .3s ease}
    .diff-list.expanded{max-height:3000px;opacity:1;overflow:visible}
    .diff-card{display:flex;height:90px;cursor:pointer;position:relative;margin:3px 0 0 0;border-radius:6px;overflow:hidden;transition:transform .15s;box-shadow:0 2px 8px rgba(0,0,0,.1)}
    .diff-card:hover{transform:scale(1.02)}.diff-card:active{transform:scale(0.99)}
    .diff-card .sg-thumb{width:90px}.diff-card .sg-body{background:rgba(50,110,200,0.82)}
    .diff-card.selected .sg-body{background:rgba(255,255,255,0.95)}
    .diff-card.selected .sg-title{color:#333;text-shadow:none}.diff-card.selected .sg-sub{color:#666}
    .diff-card.selected .sg-diff-name{color:#444;text-shadow:none}
    .diff-card.selected .star-full{color:rgba(0,0,0,.7)}.diff-card.selected .star-partial{color:rgba(0,0,0,.15)}
    .diff-card.selected .star-partial-fill{color:rgba(0,0,0,.7)}.diff-card.selected .star-empty{color:rgba(0,0,0,.12)}
    .star-full{color:rgba(255,255,255,.9);font-size:1em}

    .info-panel{position:fixed;top:70px;left:12px;z-index:50;width:300px;background:rgba(30,50,80,.85);backdrop-filter:blur(8px);border-radius:8px;border:1px solid rgba(100,160,255,.15);padding:14px 18px;color:#fff;font-family:'JetBrains Mono',monospace;box-shadow:0 4px 24px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.05);transition:opacity .25s,transform .25s;opacity:0;transform:translateY(-10px);pointer-events:none}

    .game-prompt{position:fixed;inset:0;z-index:215;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.7);color:#fff;font-family:'ZCOOL KuaiLe',sans-serif}

    .pause-overlay{position:fixed;inset:0;z-index:250;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.65);backdrop-filter:blur(4px)}

    .pause-menu{display:flex;flex-direction:column;gap:14px;align-items:center}
    .pause-btn{width:240px;padding:16px 0;font-family:'ZCOOL KuaiLe',sans-serif;font-size:1.2rem;color:#fff;border:2px solid rgba(255,255,255,.3);border-radius:8px;background:rgba(255,255,255,.08);cursor:pointer;transition:all .2s;text-align:center;backdrop-filter:blur(4px)}

    .pause-btn:active{transform:scale(.97)}

    .rp-score{font-family:'JetBrains Mono',monospace;font-size:2.8rem;font-weight:700;letter-spacing:3px;margin:8px 0 16px;text-shadow:0 2px 8px rgba(0,0,0,.3)}

    .rp-footer{display:flex;justify-content:space-between;align-items:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid rgba(255,255,255,.2)}

    .rp-combo-label,.rp-acc-label{font-size:.7rem;opacity:.6;text-transform:uppercase}

    .rp-grade.S{color:#f0d060}.rp-grade.A{color:#5cff5c}.rp-grade.B{color:#5c9eff}.rp-grade.C{color:#c090ff}.rp-grade.D{color:#ff5c5c}

    .rp-btn:hover{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.5)}
    .site-footer{position:fixed;bottom:0;left:0;right:0;z-index:90;
      text-align:center;padding:10px 20px;font-size:.72rem;
      color:var(--text-dim);background:var(--back-bg);
      border-top:1px solid var(--zone-border);backdrop-filter:blur(8px)}
    .site-footer a{color:var(--accent);text-decoration:none}
    .site-footer a:hover{text-decoration:underline;color:var(--brown)}
  </style>
</head>
<body>

        </div>

          <div class="rp-combo-block"><div class="rp-combo-label">Max Combo</div><div class="rp-combo-val" id="rpCombo">0x</div></div>

        </div>

<script>
const SKINS_ROOT = './Skins/';
const DEFAULT_SKIN = 'Legacy';
let currentSkin = null; // 未来用于皮肤选择，null=只用默认

const Skin = { img: {}, tinted: {} };

// 逻辑名 → 各皮肤下的实际文件名映射
// Legacy 的文件都带 @2x 后缀，Retro 不带
const SKIN_FILE_MAP = {
  Legacy: {
    'hitcircle':'hitcircle@2x.png','hitcircleoverlay':'hitcircleoverlay@2x.png',
    'approachcircle':'approachcircle@2x.png',
    'default-0':'default-0@2x.png','default-1':'default-1@2x.png','default-2':'default-2@2x.png',
    'default-3':'default-3@2x.png','default-4':'default-4@2x.png','default-5':'default-5@2x.png',
    'default-6':'default-6@2x.png','default-7':'default-7@2x.png','default-8':'default-8@2x.png',
    'default-9':'default-9@2x.png',
    'sliderb0':'sliderb0@2x.png','sliderb1':'sliderb1@2x.png','sliderb2':'sliderb2@2x.png','sliderb3':'sliderb3@2x.png',
    'sliderb4':'sliderb4@2x.png','sliderb5':'sliderb5@2x.png','sliderb6':'sliderb6@2x.png','sliderb7':'sliderb7@2x.png',
    'sliderb8':'sliderb8@2x.png','sliderb9':'sliderb9@2x.png','sliderfollowcircle':'sliderfollowcircle@2x.png',
    'reversearrow':'reversearrow@2x.png',
    'cursor':'cursor@2x.png','cursortrail':'cursortrail@2x.png','cursormiddle':'cursormiddle@2x.png',
    'hit0':'hit0@2x.png','hit50':'hit50@2x.png','hit100':'hit100@2x.png','hit300':'hit300@2x.png',
    'hit300g':'hit300g@2x.png','hit300k':'hit300k@2x.png','hit100k':'hit100k@2x.png',
    'spinner-circle':'spinner-circle@2x.png','spinner-approachcircle':'spinner-approachcircle@2x.png',
    'spinner-clear':'spinner-clear@2x.png','ranking-D':'ranking-D@2x.png','ranking-C':'ranking-C@2x.png',
    'ranking-B':'ranking-B@2x.png','ranking-A':'ranking-A@2x.png',
    'ranking-S':'ranking-S@2x.png','ranking-SH':'ranking-SH@2x.png',
    'ranking-X':'ranking-X@2x.png','ranking-XH':'ranking-XH@2x.png',
    // 音效
    'normal-hitnormal':'normal-hitnormal.wav','normal-hitclap':'normal-hitclap.wav',
    'normal-hitwhistle':'normal-hitwhistle.wav','normal-hitfinish':'normal-hitfinish.wav',
    'soft-hitnormal':'soft-hitnormal.wav','soft-hitclap':'soft-hitclap.wav',
    'soft-hitwhistle':'soft-hitwhistle.wav','soft-hitfinish':'soft-hitfinish.wav',
    'drum-hitnormal':'drum-hitnormal.wav','drum-hitclap':'drum-hitclap.wav',
    'drum-hitwhistle':'drum-hitwhistle.wav','drum-hitfinish':'drum-hitfinish.wav',
    'normal-slidertick':'normal-slidertick.wav',
    'combobreak':'combobreak.mp3','spinnerbonus':'spinnerbonus.wav','spinnerspin':'spinnerspin.wav',
    'sectionpass':'sectionpass.mp3','sectionfail':'sectionfail.mp3','failsound':'failsound.mp3',
    'applause':'applause.mp3','menuclick':'menuclick.wav','menuhit':'menuhit.wav','menuback':'menuback.wav'
  }
};

// 获取资源的完整路径：优先 currentSkin，回退 DEFAULT_SKIN
function skinPath(logicalName) {
  if (currentSkin && SKIN_FILE_MAP[currentSkin] && SKIN_FILE_MAP[currentSkin][logicalName]) {
    return SKINS_ROOT + currentSkin + '/' + SKIN_FILE_MAP[currentSkin][logicalName];
  }
  const def = SKIN_FILE_MAP[DEFAULT_SKIN];
  if (def && def[logicalName]) return SKINS_ROOT + DEFAULT_SKIN + '/' + def[logicalName];
  return null;
}

// 需要预加载的图片逻辑名
const SKIN_IMG_NAMES = [
  'hitcircle','hitcircleoverlay','approachcircle',
  'default-0','default-1','default-2','default-3','default-4',
  'default-5','default-6','default-7','default-8','default-9',
  'sliderb0','sliderb1','sliderb2','sliderb3','sliderb4','sliderb5','sliderb6','sliderb7','sliderb8','sliderb9','sliderfollowcircle','reversearrow',
  'cursor','cursortrail','cursormiddle',
  'hit0','hit50','hit100','hit300','hit300g','hit300k','hit100k',
  'spinner-circle','spinner-approachcircle','spinner-clear',
  'ranking-D','ranking-C','ranking-B','ranking-A','ranking-S','ranking-SH','ranking-X','ranking-XH'
];

function loadSkin() {
  return new Promise(resolve => {
    let loaded = 0; const total = SKIN_IMG_NAMES.length;
    const done = () => { loaded++; if (loaded >= total) resolve(); };
    for (const name of SKIN_IMG_NAMES) {
      const url = skinPath(name);
      if (!url) { done(); continue; }
      const img = new Image(); img.src = url;
      img.onload = () => { Skin.img[name] = img; done(); };
      img.onerror = () => { console.warn('皮肤图片缺失:', name, url); done(); };
    }
  });
}

// 获取皮肤图片，未加载到返回 null（不画）
function sI(name) { return Skin.img[name] || null; }

// 为 combo color 创建染色 hitcircle / approachcircle
function tintImage(img, r, g, b) {
  const c = document.createElement('canvas'); c.width = img.width; c.height = img.height;
  const x = c.getContext('2d'); x.drawImage(img, 0, 0);
  x.globalCompositeOperation = 'multiply';
  x.fillStyle = `rgb(${r},${g},${b})`; x.fillRect(0, 0, c.width, c.height);
  x.globalCompositeOperation = 'destination-in'; x.drawImage(img, 0, 0);
  return c;
}

function buildTintCache(colours) {
  Skin.tinted = { hitcircle: [], approachcircle: [], sliderb: [] };
  const hc = sI('hitcircle'), ac = sI('approachcircle');
  for (const [r, g, b] of colours) {
    Skin.tinted.hitcircle.push(hc ? tintImage(hc, r, g, b) : null);
    Skin.tinted.approachcircle.push(ac ? tintImage(ac, r, g, b) : null);
    const frames = [];
    for (let f = 0; f < 10; f++) {
      const src = sI('sliderb' + f);
      if (!src) { frames.push(null); continue; }
      const c = document.createElement('canvas'); c.width = src.width; c.height = src.height;
      const x = c.getContext('2d');
      x.fillStyle = `rgb(${r},${g},${b})`;
      x.fillRect(0, 0, c.width, c.height);
      const tmp = document.createElement('canvas'); tmp.width = src.width; tmp.height = src.height;
      const tx = tmp.getContext('2d');
      tx.drawImage(src, 0, 0);
      tx.globalCompositeOperation = 'source-in';
      tx.fillStyle = '#000';
      tx.fillRect(0, 0, tmp.width, tmp.height);
      x.drawImage(tmp, 0, 0);
      const mask = document.createElement('canvas'); mask.width = src.width; mask.height = src.height;
      const mx = mask.getContext('2d');
      mx.beginPath(); mx.arc(src.width/2, src.height/2, src.width/2, 0, Math.PI*2); mx.fill();
      // 左上角白色高光
      x.globalCompositeOperation = 'source-over';
      const hlR = src.width * 0.15;
      const hlX = src.width * 0.32;
      const hlY = src.height * 0.32;
      const grad = x.createRadialGradient(hlX, hlY, 0, hlX, hlY, hlR);
      grad.addColorStop(0, 'rgba(255,255,255,0.85)');
      grad.addColorStop(0.5, 'rgba(255,255,255,0.3)');
      grad.addColorStop(1, 'rgba(255,255,255,0)');
      x.fillStyle = grad;
      x.fillRect(0, 0, c.width, c.height);
      x.globalCompositeOperation = 'destination-in';
      x.drawImage(mask, 0, 0);
      frames.push(c);
    }
    Skin.tinted.sliderb.push(frames);
  }
}

const HS = { ctx: null, buf: {}, vol: 1.0 };
const HITSOUND_NAMES = [
  'normal-hitnormal','normal-hitclap','normal-hitwhistle','normal-hitfinish',
  'soft-hitnormal','soft-hitclap','soft-hitwhistle','soft-hitfinish',
  'drum-hitnormal','drum-hitclap','drum-hitwhistle','drum-hitfinish',
  'normal-slidertick','combobreak','spinnerbonus','spinnerspin',
  'sectionpass','sectionfail','failsound','applause','menuclick','menuhit','menuback'
];

async function initHitSounds() {
  if (HS.ctx) return;
  HS.ctx = new (window.AudioContext || window.webkitAudioContext)();
  await Promise.allSettled(HITSOUND_NAMES.map(async name => {
    const url = skinPath(name);
    if (!url) return;
    try { const r = await fetch(url); const ab = await r.arrayBuffer();
      HS.buf[name] = await HS.ctx.decodeAudioData(ab);
    } catch (e) { console.warn('音效加载失败:', name, url); }
  }));
}

function playHS(name, volume) {
  if (!HS.ctx || !HS.buf[name]) return;
  if (HS.ctx.state === 'suspended') HS.ctx.resume();
  const src = HS.ctx.createBufferSource(); src.buffer = HS.buf[name];
  const gain = HS.ctx.createGain(); gain.gain.value = (volume || 1) * HS.vol;
  src.connect(gain); gain.connect(HS.ctx.destination); src.start();
}

function playHitSound(hitSoundBits, sampleSet, volume) {
  const ss = sampleSet || 'normal';
  playHS(ss + '-hitnormal', volume);
  if (hitSoundBits & 2) playHS(ss + '-hitwhistle', volume);
  if (hitSoundBits & 4) playHS(ss + '-hitfinish', volume);
  if (hitSoundBits & 8) playHS(ss + '-hitclap', volume);
}

// ── 全局光标系统 ──
const Cursor = {
  trail: [], ripples: [], scale: 1, mx: 0, my: 0, down: false,
  canvas: null, ctx: null, raf: null
};

(function initGlobalCursor() {
  const c = document.createElement('canvas');
  c.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:99999;';
  document.body.appendChild(c);
  Cursor.canvas = c; Cursor.ctx = c.getContext('2d');

  function resize() { c.width = window.innerWidth; c.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);

  document.addEventListener('mousemove', e => { Cursor.mx = e.clientX; Cursor.my = e.clientY; });
  document.addEventListener('mousedown', () => { Cursor.down = true;
    Cursor.ripples.push({ x: Cursor.mx, y: Cursor.my, t: performance.now() }); });
  document.addEventListener('mouseup', () => { Cursor.down = false; });

  function loop() {
    Cursor.raf = requestAnimationFrame(loop);
    const ctx = Cursor.ctx, W = c.width, H = c.height, now = performance.now();
    ctx.clearRect(0, 0, W, H);
    const mx = Cursor.mx, my = Cursor.my;

    // 插值拖尾点
    if (Cursor._lx !== undefined) {
      const dist = Math.hypot(mx - Cursor._lx, my - Cursor._ly);
      const steps = Math.floor(dist / 3);
      for (let i = 1; i <= steps; i++) {
        Cursor.trail.push({
          x: Cursor._lx + (mx - Cursor._lx) * (i / steps),
          y: Cursor._ly + (my - Cursor._ly) * (i / steps), t: now });
      }
    }
    Cursor.trail.push({ x: mx, y: my, t: now });
    Cursor._lx = mx; Cursor._ly = my;
    Cursor.trail = Cursor.trail.filter(p => now - p.t < 600);

    // 拖尾渲染
    const trailImg = typeof sI === 'function' ? sI('cursortrail') : null;
    if (trailImg) {
      for (const p of Cursor.trail) {
        const age = (now - p.t) / 600, alpha = Math.max(0, (1 - age) * 0.5);
        const sz = 12 * (1 - age * 0.3);
        ctx.save(); ctx.globalAlpha = alpha;
        ctx.drawImage(trailImg, p.x - sz/2, p.y - sz/2, sz, sz); ctx.restore();
      }
    }

    // 点击扩散圆
    Cursor.ripples = Cursor.ripples.filter(r => now - r.t < 300);
    for (const rip of Cursor.ripples) {
      const age = (now - rip.t) / 300;
      ctx.save(); ctx.globalAlpha = (1 - age) * 0.25;
      ctx.beginPath(); ctx.arc(rip.x, rip.y, 40 + age * 30, 0, Math.PI * 2);
      ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(180,200,255,0.8)'; ctx.stroke(); ctx.restore();
    }

    // 光标本体
    const curImg = typeof sI === 'function' ? sI('cursor') : null;
    const midImg = typeof sI === 'function' ? sI('cursormiddle') : null;
    if (curImg) {
      const target = Cursor.down ? 1.0 : 0.75;
      Cursor.scale += (target - Cursor.scale) * 0.25;
      const sz = 100 * Cursor.scale;
      ctx.save(); ctx.translate(mx, my); ctx.rotate(now * 0.001); ctx.globalAlpha = 0.95;
      ctx.drawImage(curImg, -sz/2, -sz/2, sz, sz); ctx.restore();
      if (midImg) { const ms = sz * 0.3;
        ctx.save(); ctx.globalAlpha = 0.9;
        ctx.drawImage(midImg, mx - ms/2, my - ms/2, ms, ms); ctx.restore(); }
    }
  }
  loop();
})();

function parseOsu(text){
  const r={fileFormat:null,general:{},metadata:{},difficulty:{},
    events:{background:null,video:null,breaks:[]},timingPoints:[],colours:[],hitObjects:[]};
  const vm=text.match(/osu file format v(\d+)/);if(vm)r.fileFormat=parseInt(vm[1]);
  const sections={};let cur=null;
  for(const raw of text.split('\n')){const line=raw.trim();
    if(!line||line.startsWith('//'))continue;
    const sm=line.match(/^\[(\w+)\]$/);if(sm){cur=sm[1];sections[cur]=[];continue}
    if(cur)sections[cur].push(line)}
  if(sections.General)for(const l of sections.General){
    const[k,...v]=l.split(':');const val=v.join(':').trim();const key=k.trim();
    if(key==='AudioFilename')r.general.audioFilename=val;
    else if(key==='PreviewTime')r.general.previewTime=parseInt(val);
    else if(key==='Mode')r.general.mode=parseInt(val);
    else if(key==='SampleSet')r.general.sampleSet=val.toLowerCase();
    else if(key==='StackLeniency')r.general.stackLeniency=parseFloat(val);
    else if(key==='AudioLeadIn')r.general.audioLeadIn=parseInt(val)||0}
  if(!r.general.sampleSet)r.general.sampleSet='normal';
  if(sections.Metadata)for(const l of sections.Metadata){
    const[k,...v]=l.split(':');const val=v.join(':').trim();const key=k.trim();
    if(key==='Title')r.metadata.title=val;else if(key==='TitleUnicode')r.metadata.titleUnicode=val;
    else if(key==='Artist')r.metadata.artist=val;else if(key==='ArtistUnicode')r.metadata.artistUnicode=val;
    else if(key==='Creator')r.metadata.creator=val;else if(key==='Version')r.metadata.version=val;
    else if(key==='Tags')r.metadata.tags=val.split(' ');
    else if(key==='BeatmapID')r.metadata.beatmapID=parseInt(val);
    else if(key==='BeatmapSetID')r.metadata.beatmapSetID=parseInt(val)}
  if(sections.Difficulty)for(const l of sections.Difficulty){
    const[k,...v]=l.split(':');const val=v.join(':').trim();const key=k.trim();
    if(key==='HPDrainRate')r.difficulty.hp=parseFloat(val);
    else if(key==='CircleSize')r.difficulty.cs=parseFloat(val);
    else if(key==='OverallDifficulty')r.difficulty.od=parseFloat(val);
    else if(key==='ApproachRate')r.difficulty.ar=parseFloat(val);
    else if(key==='SliderMultiplier')r.difficulty.sliderMultiplier=parseFloat(val);
    else if(key==='SliderTickRate')r.difficulty.sliderTickRate=parseFloat(val)}
  if(sections.Events)for(const l of sections.Events){
    const bg=l.match(/^0,0,"(.+?)"/);if(bg){r.events.background=bg[1];continue}
    const vid=l.match(/^Video,(-?\d+),"(.+?)"/);
    if(vid){let fn=vid[2];fn=fn.replace(/\.avi$/i,'.mp4');r.events.video={offset:parseInt(vid[1]),filename:fn};continue}
    const br=l.match(/^2,(\d+),(\d+)/);if(br)r.events.breaks.push({start:parseInt(br[1]),end:parseInt(br[2])})}
  if(sections.TimingPoints)for(const l of sections.TimingPoints){
    const p=l.split(',');if(p.length<2)continue;const ss=parseInt(p[3])||0;
    const tp={time:parseFloat(p[0]),beatLength:parseFloat(p[1]),meter:parseInt(p[2])||4,
      sampleSet:ss===1?'normal':ss===2?'soft':ss===3?'drum':null,
      volume:parseInt(p[5])||100,uninherited:(parseInt(p[6])||0)===1,effects:parseInt(p[7])||0};
    if(tp.uninherited){tp.bpm=Math.round(60000/tp.beatLength*100)/100;tp.svMultiplier=1}
    else{tp.bpm=null;tp.svMultiplier=Math.round(-100/tp.beatLength*1000)/1000}
    tp.isKiai=(tp.effects&1)===1;r.timingPoints.push(tp)}
  if(sections.Colours)for(const l of sections.Colours){
    const m=l.match(/Combo\d+\s*:\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/);
    if(m)r.colours.push([parseInt(m[1]),parseInt(m[2]),parseInt(m[3])])}
  if(r.colours.length===0)r.colours=[[255,128,192],[255,198,170],[255,64,64],[106,213,0]];
  if(sections.HitObjects){let ci=0,cn=1;
    for(const l of sections.HitObjects){const p=l.split(',');if(p.length<4)continue;
      const x=parseInt(p[0]),y=parseInt(p[1]),time=parseInt(p[2]),tb=parseInt(p[3]),hs=parseInt(p[4]);
      const isCircle=(tb&1)===1,isSlider=(tb&2)===2,isNewCombo=(tb&4)===4,isSpinner=(tb&8)===8;
      const skip=(tb>>4)&7;if(isNewCombo){ci=(ci+1+skip)%r.colours.length;cn=1}
      const obj={x,y,time,typeBits:tb,hitSound:hs,isCircle,isSlider,isSpinner,isNewCombo,
        comboIndex:ci,comboNumber:cn++,comboColor:r.colours[ci]};
      if(isSpinner){obj.type='spinner';obj.endTime=parseInt(p[5])||time;obj.duration=obj.endTime-time}
      else if(isSlider){obj.type='slider';const cd=p[5];const segs=cd.split('|');
        obj.curveType=segs[0];obj.controlPoints=[{x,y}];
        for(let i=1;i<segs.length;i++){const[cx,cy]=segs[i].split(':');obj.controlPoints.push({x:parseInt(cx),y:parseInt(cy)})}
        obj.repeat=parseInt(p[6])||1;obj.pixelLength=parseFloat(p[7])||0;
        obj.duration=calcSliderDuration(obj,r);obj.endTime=obj.time+obj.duration}
      else{obj.type='circle';obj.endTime=time}
      r.hitObjects.push(obj)}}
  r.stats={circles:r.hitObjects.filter(o=>o.type==='circle').length,sliders:r.hitObjects.filter(o=>o.type==='slider').length,
    spinners:r.hitObjects.filter(o=>o.type==='spinner').length,total:r.hitObjects.length};
  const last=r.hitObjects[r.hitObjects.length-1];
  r.stats.lastObjectTime=last?(last.endTime||last.time):0;r.stats.lengthSeconds=Math.floor(r.stats.lastObjectTime/1000);
  const ar=r.difficulty.ar??5;
  r.difficulty.preempt=ar<5?1200+600*(5-ar)/5:ar===5?1200:1200-750*(ar-5)/5;
  r.difficulty.fadeIn=ar<5?800+400*(5-ar)/5:ar===5?800:800-500*(ar-5)/5;
  r.difficulty.circleRadius=54.4-4.48*(r.difficulty.cs??4);
  const od=r.difficulty.od??5;r.difficulty.hitWindows={hit300:80-6*od,hit100:140-8*od,hit50:200-10*od};
  for(let i=0;i<r.hitObjects.length;i++){const isLast=i===r.hitObjects.length-1;
    r.hitObjects[i].isComboEnd=isLast||(!isLast&&r.hitObjects[i+1].isNewCombo)}
  return r}
function calcSliderDuration(s,bm){const sm=bm.difficulty.sliderMultiplier||1.4;
  const tp=getTPAt(bm.timingPoints,s.time);return Math.round(s.pixelLength/(sm*100*tp.sv)*tp.bl*s.repeat)}
function getTPAt(tps,time){let bl=375,sv=1;for(const t of tps){if(t.time>time)break;
  if(t.uninherited){bl=t.beatLength;sv=1}else sv=t.svMultiplier}return{bl,sv}}
function getSSAt(bm,time){let ss=bm.general.sampleSet;
  for(const t of bm.timingPoints){if(t.time>time)break;if(t.sampleSet)ss=t.sampleSet}return ss}

function computeSliderPath(s){const pts=s.controlPoints;let raw;
  switch(s.curveType){case'L':raw=linearPath(pts);break;case'P':raw=pts.length===3?perfectPath(pts):bezierPath(pts);break;
    case'B':raw=bezierPath(pts);break;default:raw=linearPath(pts)}return truncatePath(raw,s.pixelLength)}
function linearPath(pts){const o=[];for(let i=0;i<pts.length-1;i++){const a=pts[i],b=pts[i+1];
  const d=Math.hypot(b.x-a.x,b.y-a.y);const n=Math.max(Math.ceil(d/2),1);
  for(let t=0;t<=n;t++){const f=t/n;o.push({x:a.x+(b.x-a.x)*f,y:a.y+(b.y-a.y)*f})}}return o}
function perfectPath(pts){const[a,b,c]=pts;
  const D=2*(a.x*(b.y-c.y)+b.x*(c.y-a.y)+c.x*(a.y-b.y));if(Math.abs(D)<.001)return linearPath(pts);
  const ux=((a.x*a.x+a.y*a.y)*(b.y-c.y)+(b.x*b.x+b.y*b.y)*(c.y-a.y)+(c.x*c.x+c.y*c.y)*(a.y-b.y))/D;
  const uy=((a.x*a.x+a.y*a.y)*(c.x-b.x)+(b.x*b.x+b.y*b.y)*(a.x-c.x)+(c.x*c.x+c.y*c.y)*(b.x-a.x))/D;
  const R=Math.hypot(a.x-ux,a.y-uy);const a1=Math.atan2(a.y-uy,a.x-ux);const a3=Math.atan2(c.y-uy,c.x-ux);
  const cross=(b.x-a.x)*(c.y-a.y)-(b.y-a.y)*(c.x-a.x);const cw=cross<0;
  let start=a1,end=a3;if(cw){if(end>start)end-=2*Math.PI}else{if(end<start)end+=2*Math.PI}
  const ta=end-start;const al=Math.abs(ta)*R;const n=Math.max(Math.ceil(al/2),20);const o=[];
  for(let i=0;i<=n;i++){const t=i/n;const ang=start+ta*t;o.push({x:ux+R*Math.cos(ang),y:uy+R*Math.sin(ang)})}return o}
function bezierPath(pts){const segs=[];let seg=[pts[0]];
  for(let i=1;i<pts.length;i++){if(pts[i].x===pts[i-1].x&&pts[i].y===pts[i-1].y){if(seg.length>0)segs.push(seg);seg=[pts[i]]}else seg.push(pts[i])}
  if(seg.length>0)segs.push(seg);const o=[];for(const s of segs){if(s.length<2)continue;
    const n=Math.max(s.length*20,40);for(let i=0;i<=n;i++)o.push(deCasteljau(s,i/n))}return o}
function deCasteljau(pts,t){let p=pts.map(p=>({x:p.x,y:p.y}));
  while(p.length>1){const n=[];for(let i=0;i<p.length-1;i++)n.push({x:p[i].x+(p[i+1].x-p[i].x)*t,y:p[i].y+(p[i+1].y-p[i].y)*t});p=n}return p[0]}
function truncatePath(path,length){if(path.length<2)return path;const o=[path[0]];let d=0;
  for(let i=1;i<path.length;i++){const dd=Math.hypot(path[i].x-path[i-1].x,path[i].y-path[i-1].y);
    if(d+dd>=length){const rem=length-d;const f=rem/dd;o.push({x:path[i-1].x+(path[i].x-path[i-1].x)*f,y:path[i-1].y+(path[i].y-path[i-1].y)*f});break}d+=dd;o.push(path[i])}return o}
function getSliderPosAt(path,t){if(!path||path.length<2)return path?path[0]:{x:0,y:0};
  let tot=0;for(let i=1;i<path.length;i++)tot+=Math.hypot(path[i].x-path[i-1].x,path[i].y-path[i-1].y);
  let tgt=t*tot,acc=0;for(let i=1;i<path.length;i++){const d=Math.hypot(path[i].x-path[i-1].x,path[i].y-path[i-1].y);
    if(acc+d>=tgt){const f=(tgt-acc)/d;return{x:path[i-1].x+(path[i].x-path[i-1].x)*f,y:path[i-1].y+(path[i].y-path[i-1].y)*f}}acc+=d}return path[path.length-1]}

const Preview={audio:null,fadeTimer:null,currentFolder:null,currentFile:null,volume:0,targetVolume:0.5};
function startPreview(bm){const folder=bm._folder,file=bm.general.audioFilename,pt=(bm.general.previewTime||0)/1000;
  if(Preview.audio&&Preview.currentFolder===folder&&Preview.currentFile===file)return;stopPreview();
  const audio=new Audio(folder+'/'+file);audio.loop=false;audio.volume=0;
  Preview.audio=audio;Preview.currentFolder=folder;Preview.currentFile=file;Preview.volume=0;
  audio.addEventListener('loadedmetadata',()=>{audio.currentTime=Math.max(0,pt);audio.play().catch(()=>{});
    clearInterval(Preview.fadeTimer);Preview.fadeTimer=setInterval(()=>{Preview.volume=Math.min(Preview.volume+0.02,Preview.targetVolume);
      if(Preview.audio)Preview.audio.volume=Preview.volume;if(Preview.volume>=Preview.targetVolume)clearInterval(Preview.fadeTimer)},20)},{once:true});
  audio.addEventListener('ended',()=>{audio.currentTime=Math.max(0,pt);audio.play().catch(()=>{})})}
function fadeOutAndStop(cb){clearInterval(Preview.fadeTimer);if(!Preview.audio){if(cb)cb();return}
  Preview.fadeTimer=setInterval(()=>{Preview.volume=Math.max(Preview.volume-0.04,0);
    if(Preview.audio)Preview.audio.volume=Preview.volume;
    if(Preview.volume<=0){clearInterval(Preview.fadeTimer);if(Preview.audio){Preview.audio.pause();Preview.audio.src='';Preview.audio=null}
      Preview.currentFolder=null;Preview.currentFile=null;if(cb)cb()}},20)}
function stopPreview(){clearInterval(Preview.fadeTimer);if(Preview.audio){Preview.audio.pause();Preview.audio.src='';Preview.audio=null}
  Preview.currentFolder=null;Preview.currentFile=null;Preview.volume=0}

const containerEl=document.getElementById('container'),loadingState=document.getElementById('loadingState');
let allBeatmaps=[],expandedGroup=-1,selectedDiff=null;
async function init(){try{const res=await fetch('maps.json');const maps=await res.json();
    if(!maps.length){showEmpty();return}const songGroups=[];
    for(const entry of maps){const osuEntries=Array.isArray(entry.osu)?entry.osu:(typeof entry.osu==='string'?[{file:entry.osu,stars:0}]:[entry.osu]);
      const diffs=[];for(const oe of osuEntries){const file=typeof oe==='string'?oe:oe.file;const stars=typeof oe==='object'?oe.stars||0:0;
        try{const r=await fetch(entry.folder+'/'+file);const text=await r.text();const parsed=parseOsu(text);
          parsed._folder=entry.folder;parsed._osuFile=file;parsed._stars=stars;
          for(const obj of parsed.hitObjects)if(obj.type==='slider')obj._path=computeSliderPath(obj);
          diffs.push(parsed)}catch(e){console.warn('跳过:',entry.folder+'/'+file,e)}}
      if(diffs.length>0){diffs.sort((a,b)=>(a._stars||0)-(b._stars||0));songGroups.push({folder:entry.folder,diffs})}}
    allBeatmaps=songGroups;loadingState.style.display='none';if(!songGroups.length){showEmpty();return}renderList(songGroups)
  }catch(e){loadingState.innerHTML='<i class="fas fa-exclamation-triangle"></i> 加载失败: '+e.message}}
function showEmpty(){loadingState.style.display='none';containerEl.innerHTML='<div class="empty-state"><i class="far fa-folder-open"></i><div>暂无谱面</div></div>'}
function renderList(groups){let h='';groups.forEach((group,gi)=>{const isMulti=group.diffs.length>1;const first=group.diffs[0];const m=first.metadata;
    const title=m.titleUnicode||m.title||'?',artist=m.artistUnicode||m.artist||'?';
    const bg=first.events.background?group.folder+'/'+first.events.background:'';

function getStarBgColor(s){if(s<=1.5)return'rgba(80,180,50,0.8)';if(s<=2.5)return'rgba(50,120,210,0.8)';if(s<=3.75)return'rgba(200,160,30,0.8)';

const G={state:'list',bm:null,audioCtx:null,audioBuffer:null,audioSource:null,audioStartCtxTime:0,
  pausedGameTime:0,canvas:null,ctx:null,scale:1,offX:0,offY:0,bgImage:null,bgVideo:null,useVideo:true,_videoOffset:0,
  time:0,score:0,combo:0,maxCombo:0,hits:{300:0,100:0,50:0,miss:0,geki:0,katu:0},
  objState:[],effects:[],mouseX:0,mouseY:0,mouseDown:false,pendingClicks:[],animFrame:null,
  quickRestartProgress:0,quickRestartActive:false,
  sliderBurstEffects:[],comboGroupWorst:300,diffMultiplier:0};
const gameScreen=document.getElementById('gameScreen'),gameCanvas=document.getElementById('gameCanvas'),
  gamePrompt=document.getElementById('gamePrompt'),promptText=document.getElementById('promptText'),
  promptSub=document.getElementById('promptSub'),ghudScore=document.getElementById('ghudScore'),

async function onMapClick(bm){fadeOutAndStop();await initHitSounds();
  document.querySelector('.site-footer').style.display='none';
  G.bm=bm;G.state='loading';gameScreen.classList.remove('hidden');document.getElementById('topBar').style.display='none';
  gamePrompt.classList.remove('hidden');promptText.textContent='加载音频中…';
  promptSub.textContent=(bm.metadata.titleUnicode||bm.metadata.title)+' ['+bm.metadata.version+']';
  G.canvas=gameCanvas;G.ctx=G.canvas.getContext('2d');resizeCanvas();buildTintCache(bm.colours);
  if(bm.events.background){const img=new Image();img.src=bm._folder+'/'+bm.events.background;img.onload=()=>{G.bgImage=img}}
  G.bgVideo=null;const vEl=document.getElementById('bgVideo');vEl.style.opacity='0';vEl.pause();vEl.removeAttribute('src');

    G.audioBuffer=await G.audioCtx.decodeAudioData(buf);G.state='ready';promptText.textContent='点击开始';promptSub.textContent='准备好了吗？'}

function resetGameState(){G.score=0;G.combo=0;G.maxCombo=0;G.comboGroupWorst=300;
  G.hits={300:0,100:0,50:0,miss:0,geki:0,katu:0};
  G.objState=G.bm.hitObjects.map(()=>({judged:false,result:null,hitTime:null,sliderTracking:false}));
  G.effects=[];G.pendingClicks=[];G.sliderBurstEffects=[];G.quickRestartProgress=0}

function startAudio(){
  G.audioSource = G.audioCtx.createBufferSource();
  G.audioSource.buffer = G.audioBuffer;
  const bgmGain = G.audioCtx.createGain();
  bgmGain.gain.value = 0.5;
  G.audioSource.connect(bgmGain);
  bgmGain.connect(G.audioCtx.destination);
  
  const ft = G.bm.hitObjects.length>0 ? G.bm.hitObjects[0].time : 0;
  const pre = G.bm.difficulty.preempt;
  const ml = Math.max(0, pre+500-ft), li = Math.max(G.bm.general.audioLeadIn||0, ml);
  G.audioStartCtxTime = G.audioCtx.currentTime + li/1000;
  G.audioSource.start(G.audioStartCtxTime);
  G.audioSource.onended = () => { if(G.state==='playing') setTimeout(endGame, 500) };
}

function startPlaying(){if(G.state!=='ready')return;G.state='playing';gamePrompt.classList.add('hidden');pauseOverlay.classList.add('hidden');
  G.diffMultiplier=Math.round(G.bm._stars||0);resetGameState();
  if(G.audioCtx.state==='suspended')G.audioCtx.resume();startAudio();
  if(G.bgVideo&&G.useVideo){const d=G._videoOffset||0;G.bgVideo.style.opacity='1';
    if(d>=0){G.bgVideo.currentTime=0;setTimeout(()=>{G.bgVideo.play().catch(()=>{})},d)}
    else{G.bgVideo.currentTime=Math.abs(d)/1000;G.bgVideo.play().catch(()=>{})}}
  G.animFrame=requestAnimationFrame(gameLoop)}

function pauseGame(){if(G.state!=='playing')return;G.state='paused';G.pausedGameTime=G.time;
  cancelAnimationFrame(G.animFrame);G.audioCtx.suspend();if(G.bgVideo&&!G.bgVideo.paused)G.bgVideo.pause();pauseOverlay.classList.remove('hidden')}
function resumeGame(){if(G.state!=='paused')return;G.state='playing';pauseOverlay.classList.add('hidden');
  G.audioCtx.resume();if(G.bgVideo&&G.useVideo)G.bgVideo.play().catch(()=>{});G.animFrame=requestAnimationFrame(gameLoop)}
function retryGame(){if(G.state!=='paused'&&G.state!=='ended')return;
  cancelAnimationFrame(G.animFrame);pauseOverlay.classList.add('hidden');resultsOverlay.classList.add('hidden');
  try{if(G.audioSource){G.audioSource.onended=null;G.audioSource.stop()}}catch(e){}
  try{if(G.audioCtx&&G.audioCtx.state==='suspended')G.audioCtx.resume()}catch(e){}
  G.state='playing';gamePrompt.classList.add('hidden');G.diffMultiplier=Math.round(G.bm._stars||0);resetGameState();startAudio();
  if(G.bgVideo&&G.useVideo){G.bgVideo.currentTime=0;G.bgVideo.play().catch(()=>{})}G.animFrame=requestAnimationFrame(gameLoop)}
document.getElementById('pauseResume').addEventListener('click',()=>{  playHS('menuhit', 0.6);  resumeGame()})
document.getElementById('pauseRetry').addEventListener('click',()=>{  playHS('menuhit', 0.6);  retryGame()})

document.getElementById('gameBack').addEventListener('click',()=>{playHS('menuback');if(G.state==='playing')pauseGame();else if(G.state==='paused')resumeGame()});

function gameLoop(){if(G.state!=='playing')return;G.time=(G.audioCtx.currentTime-G.audioStartCtxTime)*1000;
  if(G.quickRestartActive){G.quickRestartProgress+=16/1000;if(G.quickRestartProgress>=1){G.quickRestartActive=false;G.quickRestartProgress=0;retryGame();return}}
  else G.quickRestartProgress=Math.max(0,G.quickRestartProgress-16/300);
  processInput();processSliders();processSpinners();processMisses();render();updateHUD();G.animFrame=requestAnimationFrame(gameLoop)}

function processInput(){const hw=G.bm.difficulty.hitWindows,cr=G.bm.difficulty.circleRadius;
  while(G.pendingClicks.length>0){const click=G.pendingClicks.shift(),ct=click.time,ox=(click.x-G.offX)/G.scale,oy=(click.y-G.offY)/G.scale;
    let hi=-1;for(let i=0;i<G.bm.hitObjects.length;i++){if(G.objState[i].judged)continue;const obj=G.bm.hitObjects[i];
      if(obj.type==='spinner')continue;const dt=ct-obj.time;if(dt<-hw.hit50)continue;if(dt>hw.hit50)continue;
      if(Math.hypot(ox-obj.x,oy-obj.y)<=cr){hi=i;break}}
    if(hi>=0){const adt=Math.abs(ct-G.bm.hitObjects[hi].time);let result;
      if(adt<=hw.hit300)result=300;else if(adt<=hw.hit100)result=100;else result=50;const obj=G.bm.hitObjects[hi];
      if(obj.type==='slider'){G.objState[hi].sliderTracking=true;G.objState[hi].headResult=result;G.objState[hi].headHitTime=ct}
      else judgeHit(hi,result,ct)}}}

function processSliders(){if(G._lastMouseDown&&!G.mouseDown){for(let i=0;i<G.bm.hitObjects.length;i++){
    const obj=G.bm.hitObjects[i];if(obj.type!=='slider')continue;const st=G.objState[i];if(st.judged||!st.sliderTracking)continue;
    if(G.time>=obj.time&&G.time<=obj.endTime&&obj._path){const dur=obj.endTime-obj.time;let prog=(G.time-obj.time)/dur;
      if(obj.repeat>1){const seg=Math.floor(prog*obj.repeat);let lp=prog*obj.repeat-seg;if(seg%2===1)lp=1-lp;prog=lp}
      prog=Math.max(0,Math.min(1,prog));const bp=getSliderPosAt(obj._path,prog);
      G.sliderBurstEffects.push({x:bp.x,y:bp.y,born:G.time,startR:G.bm.difficulty.circleRadius*2.5})}}}
  G._lastMouseDown=G.mouseDown;const cr=G.bm.difficulty.circleRadius,hw=G.bm.difficulty.hitWindows;
  const ox=(G.mouseX-G.offX)/G.scale,oy=(G.mouseY-G.offY)/G.scale;
  for(let i=0;i<G.bm.hitObjects.length;i++){const obj=G.bm.hitObjects[i];if(obj.type!=='slider')continue;
    const st=G.objState[i];if(st.judged)continue;if(!st.sliderTracking&&G.time>obj.time+hw.hit50){judgeHit(i,'miss',null);continue}
    if(!st.sliderTracking)continue;
    if(G.time>=obj.time&&G.time<obj.endTime){const path=obj._path;if(path){const dur=obj.endTime-obj.time;let prog=(G.time-obj.time)/dur;
      if(obj.repeat>1){const seg=Math.floor(prog*obj.repeat);let lp=prog*obj.repeat-seg;if(seg%2===1)lp=1-lp;prog=lp}
      prog=Math.max(0,Math.min(1,prog));const bp=getSliderPosAt(path,prog);
      if(!G.mouseDown||Math.hypot(ox-bp.x,oy-bp.y)>cr*2.5){if(!st.sliderBreakTime)st.sliderBreakTime=G.time}
      else{st.sliderBreakTime=null}}}
    if(G.time>=obj.endTime){G.score+=30*obj.repeat+10*Math.max(0,Math.floor(obj.pixelLength/100)*obj.repeat);
      judgeHit(i,st.headResult||50,G.time)}}}

function processSpinners(){const ox=(G.mouseX-G.offX)/G.scale,oy=(G.mouseY-G.offY)/G.scale;
  for(let i=0;i<G.bm.hitObjects.length;i++){const obj=G.bm.hitObjects[i];if(obj.type!=='spinner')continue;
    const st=G.objState[i];if(st.judged)continue;if(G.time<obj.time)continue;
    if(G.time>=obj.endTime){const needed=Math.max(1,(obj.duration/1000)*1.5),rot=st.spinnerRotations||0;
      let result;if(rot>=needed)result=300;else if(rot>=needed*0.7)result=100;else if(rot>=needed*0.3)result=50;else result='miss';
      const tr=Math.floor(rot),cr2=Math.floor(needed);if(tr>0)G.score+=Math.min(tr,cr2)*100+Math.max(0,tr-cr2)*1100;
      judgeHit(i,result,G.time);continue}
    if(G.mouseDown){const angle=Math.atan2(oy-192,ox-256);
      if(st.spinnerLastAngle!=null){let delta=angle-st.spinnerLastAngle;if(delta>Math.PI)delta-=2*Math.PI;if(delta<-Math.PI)delta+=2*Math.PI;
        st.spinnerRotations=(st.spinnerRotations||0)+Math.abs(delta)/(2*Math.PI)}st.spinnerLastAngle=angle}else st.spinnerLastAngle=null}}

function processMisses(){const hw=G.bm.difficulty.hitWindows;
  for(let i=0;i<G.bm.hitObjects.length;i++){if(G.objState[i].judged)continue;const obj=G.bm.hitObjects[i];
    if(obj.type==='spinner'||obj.type==='slider')continue;if(G.time>obj.time+hw.hit50)judgeHit(i,'miss',null)}}

function judgeHit(idx,result,time){G.objState[idx].judged=true;G.objState[idx].result=result;G.objState[idx].hitTime=time||G.time;
  const obj=G.bm.hitObjects[idx];if(obj.isNewCombo)G.comboGroupWorst=300;const ss=getSSAt(G.bm,obj.time);
  if(result!=='miss'&&result>=50){G.comboGroupWorst=Math.min(G.comboGroupWorst,result);
    G.score+=Math.round(result*(1+(Math.max(G.combo,0)*G.diffMultiplier/25)));
    G.combo++;if(G.combo>G.maxCombo)G.maxCombo=G.combo;G.hits[result]++;playHitSound(obj.hitSound,ss,1);
    let dImg;if(obj.isComboEnd&&G.comboGroupWorst>=100){
      if(result===300&&G.comboGroupWorst===300){G.hits.geki++;dImg='hit300g'}
      else{G.hits.katu++;dImg=result===300?'hit300k':'hit100k'}}
    if(!dImg){if(result===300)dImg='hit300';else if(result===100)dImg='hit100';else dImg='hit50'}
    const ex=obj.type==='spinner'?256:obj.x,ey=obj.type==='spinner'?192:obj.y;
    G.effects.push({type:'score',x:ex,y:ey,born:G.time,img:dImg})
  }else{G.comboGroupWorst=0;if(G.combo>0)playHS('combobreak',1);G.combo=0;G.hits.miss++;
    const ex=obj.type==='spinner'?256:obj.x,ey=obj.type==='spinner'?192:obj.y;
    G.effects.push({type:'miss',x:ex,y:ey,born:G.time,angle:(Math.sin((G.time%2000)/2000*2*Math.PI)*10)*Math.PI/180})}}

function drawImg(ctx,img,cx,cy,w,h,alpha){if(!img)return;ctx.save();ctx.globalAlpha=alpha??1;ctx.drawImage(img,cx-w/2,cy-h/2,w,h);ctx.restore()}

function drawComboNum(ctx,num,cx,cy,cr,alpha){
  const digits=String(num).split(''),imgs=digits.map(d=>sI('default-'+d));if(!imgs[0])return;
  const h=cr*1.2,scale=h/imgs[0].height;let totalW=0;for(const im of imgs)if(im)totalW+=im.width*scale;
  const overlap=cr*0.08;totalW-=overlap*(digits.length-1);let startX=cx-totalW/2;
  ctx.save();ctx.globalAlpha=alpha;for(const im of imgs){if(!im)continue;const w=im.width*scale;
    ctx.drawImage(im,startX,cy-h/2,w,h);startX+=w-overlap}ctx.restore()}

function drawCircle(ctx,obj,cr,alpha){const ci=obj.comboIndex,sz=cr*2.1;
  const tHC=Skin.tinted.hitcircle[ci];if(tHC)drawImg(ctx,tHC,obj.x,obj.y,sz,sz,alpha*0.95);
  const ov=sI('hitcircleoverlay');if(ov)drawImg(ctx,ov,obj.x,obj.y,sz,sz,alpha);
  drawComboNum(ctx,obj.comboNumber,obj.x,obj.y,cr,alpha)}

function drawApproach(ctx,obj,cr,aR,alpha){const ci=obj.comboIndex,sz=aR*2.1;
  const tAC=Skin.tinted.approachcircle[ci];if(tAC)drawImg(ctx,tAC,obj.x,obj.y,sz,sz,alpha*0.9)}

function render(){const ctx=G.ctx,W=G.canvas.width,H=G.canvas.height;ctx.clearRect(0,0,W,H);
  const hasVideo=G.bgVideo&&G.useVideo&&!G.bgVideo.paused;
  if(!hasVideo&&G.bgImage){ctx.save();const s=Math.max(W/G.bgImage.width,H/G.bgImage.height);
    const iw=G.bgImage.width*s,ih=G.bgImage.height*s;ctx.drawImage(G.bgImage,(W-iw)/2,(H-ih)/2,iw,ih);ctx.restore()}
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,W,H);
  ctx.save();ctx.translate(G.offX,G.offY);ctx.scale(G.scale,G.scale);
  const preempt=G.bm.difficulty.preempt,fadeIn=G.bm.difficulty.fadeIn,cr=G.bm.difficulty.circleRadius,time=G.time;
  const visible=[];
  for(let i=0;i<G.bm.hitObjects.length;i++){const obj=G.bm.hitObjects[i],st=G.objState[i];
    if(time<obj.time-preempt)continue;
    if(st.judged){const since=time-(st.hitTime||obj.time);
      if(obj.type==='slider'){if(since>300)continue}else if(obj.type==='spinner'){continue}
      else if(st.result==='miss'){if(since>100)continue}else{if(since>200)continue}}
    visible.push({obj,st,idx:i})}
  visible.reverse();

  for(const{obj,st,idx}of visible){const appearTime=obj.time-preempt;
    const fadeProg=Math.min((time-appearTime)/fadeIn,1);let alpha=fadeProg;
    const[rv,gv,bv]=obj.comboColor;const col=`rgb(${rv},${gv},${bv})`;

    if(st.judged){const since=time-(st.hitTime||obj.time);
      if(obj.type==='slider'){alpha=Math.max(0,1-since/300);if(alpha<=0)continue;renderSlider(ctx,obj,cr,col,alpha,time);continue}
      if(st.result==='miss')continue;
      const prog=since/200;alpha=Math.max(0,1-prog);const sc=1+prog*0.5;
      ctx.save();ctx.translate(obj.x,obj.y);ctx.scale(sc,sc);
      const sz=cr*2.1;const tHC=Skin.tinted.hitcircle[obj.comboIndex];if(tHC)drawImg(ctx,tHC,0,0,sz,sz,alpha*0.9);
      const ov=sI('hitcircleoverlay');if(ov)drawImg(ctx,ov,0,0,sz,sz,alpha);
      drawComboNum(ctx,obj.comboNumber,0,0,cr,alpha);ctx.restore();continue}

    // Spinner
    if(obj.type==='spinner'){const cx=256,cy=192,sR=120;const rot=G.objState[idx].spinnerRotations||0;
      const needed=Math.max(1,(obj.duration/1000)*1.5),prog=Math.min(rot/needed,1);
      const spinImg=sI('spinner-circle'),spinAC=sI('spinner-approachcircle');
      if(spinImg&&time>=obj.time){ctx.save();ctx.globalAlpha=alpha;ctx.translate(cx,cy);ctx.rotate(rot*Math.PI*2);
        const sz=sR*2.2;ctx.drawImage(spinImg,-sz/2,-sz/2,sz,sz);ctx.restore()}
      if(time>=obj.time){ctx.save();ctx.globalAlpha=alpha;ctx.beginPath();ctx.arc(cx,cy,sR,-Math.PI/2,-Math.PI/2+prog*Math.PI*2);
        ctx.lineWidth=6;ctx.strokeStyle=col;ctx.stroke();ctx.fillStyle='#fff';
        ctx.font="bold 24px 'ZCOOL KuaiLe',sans-serif";ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(Math.floor(prog*100)+'%',cx,cy);ctx.restore()}
      const aProg=Math.min((time-appearTime)/preempt,1),aR2=sR+(sR*2)*(1-aProg);
      if(spinAC)drawImg(ctx,spinAC,cx,cy,aR2*2,aR2*2,alpha*0.5);
      if(prog>=1){const clr=sI('spinner-clear');if(clr)drawImg(ctx,clr,cx,cy-60,clr.width*0.5,clr.height*0.5,alpha)}
      continue}

    // Slider track
    if(obj.type==='slider'&&obj._path)renderSlider(ctx,obj,cr,col,alpha,time);
    // Circle / Slider head
    if(obj.type==='circle'||obj.type==='slider'){drawCircle(ctx,obj,cr,alpha);
      const aProg=Math.min((time-appearTime)/preempt,1),aR=cr+(cr*3)*(1-aProg);drawApproach(ctx,obj,cr,aR,alpha)}}

  renderEffects(ctx,time);ctx.restore();
  if(G.quickRestartProgress>0){ctx.globalAlpha=G.quickRestartProgress;ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);ctx.globalAlpha=1}
  ctx.globalAlpha=1}

function renderSlider(ctx, obj, cr, col, alpha, time) {
  const path = obj._path;
  if (!path || path.length < 2) return;

  const trackScale = 0.85;
  const trackAlpha = alpha * 0.7;
  const baseW = cr * 2 * trackScale;

  const [r, g, b] = obj.comboColor;
  const darkCol  = `rgb(${Math.floor(r*0.6)},${Math.floor(g*0.6)},${Math.floor(b*0.6)})`;
  const midCol   = `rgb(${Math.floor(r*0.7)},${Math.floor(g*0.7)},${Math.floor(b*0.7)})`;
  const lightCol = `rgb(${Math.floor(r*0.8)},${Math.floor(g*0.8)},${Math.floor(b*0.8)})`;
  const coreCol  = `rgb(${Math.floor(r*0.9)},${Math.floor(g*0.9)},${Math.floor(b*0.9)})`;
  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.globalAlpha = trackAlpha;
  const drawPath = (width, color, shadowBlur = 0, shadowColor = 'transparent') => {
    ctx.beginPath();
    ctx.moveTo(path[0].x, path[0].y);
    for (let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
    ctx.lineWidth = width;
    ctx.strokeStyle = color;
    ctx.shadowBlur = shadowBlur;
    ctx.shadowColor = shadowColor;
    ctx.stroke();
  };

  drawPath(baseW + 10, '#ffffff', 6, 'rgba(0, 0, 0, 0.4)');
  
  drawPath(baseW, darkCol, 0, 'transparent');
  drawPath(baseW * 0.75, midCol, 0, 'transparent');
  drawPath(baseW * 0.4, lightCol, 0, 'transparent');
  drawPath(baseW * 0.15, coreCol, 0, 'transparent');

  ctx.restore();

  const endPt = path[path.length - 1];
  const singleDur = obj.duration / obj.repeat; // 单程耗时
  const sz = cr * 2.1;
  const tHC = Skin.tinted.hitcircle[obj.comboIndex];
  const ov = sI('hitcircleoverlay');
  const raImg = sI('reversearrow');

  if (obj.repeat > 1) {
    const maxOdd = obj.repeat % 2 === 0 ? obj.repeat - 1 : obj.repeat;
    const lastFarHit = obj.time + maxOdd * singleDur;
    let farEndAlpha = alpha;
    if (time > lastFarHit) {
      farEndAlpha = Math.max(0, alpha * (1 - (time - lastFarHit) / 150)); 
    }

    if (farEndAlpha > 0) {
      ctx.save();
      ctx.globalAlpha = farEndAlpha;
      if (tHC) drawImg(ctx, tHC, endPt.x, endPt.y, sz, sz, 1);
      if (ov) drawImg(ctx, ov, endPt.x, endPt.y, sz, sz, 1);

      if (raImg) {
        const prev = path.length >= 2 ? path[path.length - 2] : path[0];
        const angle = Math.atan2(prev.y - endPt.y, prev.x - endPt.x);
        ctx.translate(endPt.x, endPt.y);
        ctx.rotate(angle);
        const arrSz = cr * 1.7;
        ctx.drawImage(raImg, -arrSz / 2, -arrSz / 2, arrSz, arrSz);
      }
      ctx.restore();
    }
  } else {
    ctx.save();
    ctx.globalAlpha = alpha;
    if (tHC) drawImg(ctx, tHC, endPt.x, endPt.y, sz, sz, 1);
    if (ov) drawImg(ctx, ov, endPt.x, endPt.y, sz, sz, 1);
    ctx.restore();
  }

  if (time >= obj.time) {
    const dur = obj.endTime - obj.time;
    if (time <= obj.endTime) {
      let prog = (time - obj.time) / dur;
      if (obj.repeat > 1) {
        const seg = Math.floor(prog * obj.repeat);
        let lp = prog * obj.repeat - seg;
        if (seg % 2 === 1) lp = 1 - lp;
        prog = lp;
      }
      prog = Math.max(0, Math.min(1, prog));
      const bp = getSliderPosAt(path, prog);
      const fcImg = sI('sliderfollowcircle');
      if (G.mouseDown && fcImg) drawImg(ctx, fcImg, bp.x, bp.y, cr * 3.2, cr * 3.2, 0.6);
      const frame = Math.floor(time / 40) % 10;
      const tintedFrames = Skin.tinted.sliderb[obj.comboIndex];
      const sbImg = tintedFrames ? tintedFrames[frame] : sI('sliderb' + frame);
      // 计算路径切线方向
      const bpAhead = getSliderPosAt(path, Math.min(1, prog + 0.01));
      const bpBehind = getSliderPosAt(path, Math.max(0, prog - 0.01));
      const angle = Math.atan2(bpAhead.y - bpBehind.y, bpAhead.x - bpBehind.x) + Math.PI;
      G.objState[G.bm.hitObjects.indexOf(obj)]._lastBallAngle = angle;
      const ballSz = cr * 2.1;
      if (sbImg) {
        ctx.save(); ctx.translate(bp.x, bp.y); ctx.rotate(angle);
        ctx.drawImage(sbImg, -ballSz/2, -ballSz/2, ballSz, ballSz);
        ctx.restore();
      }
    } else {
      const since = time - obj.endTime, fp = since / 300;
      if (fp < 1) {
        const finalT = (obj.repeat % 2 === 0) ? 0 : 1;
        const bp = getSliderPosAt(path, finalT);
        const frame = Math.floor(time / 40) % 10;
        const tintedFrames = Skin.tinted.sliderb[obj.comboIndex];
        const sbImg = tintedFrames ? tintedFrames[frame] : sI('sliderb' + frame);
        const ballSz = cr * 2.1 * (1 - fp * 0.34);
        const lastAngle = G.objState[G.bm.hitObjects.indexOf(obj)]._lastBallAngle || 0;
        if (sbImg) {
          ctx.save(); ctx.globalAlpha = (1 - fp) * alpha;
          ctx.translate(bp.x, bp.y); ctx.rotate(lastAngle);
          ctx.drawImage(sbImg, -ballSz/2, -ballSz/2, ballSz, ballSz);
          ctx.restore();
        }
      }
    }
  }
}

function renderEffects(ctx,time){const active=[];
  for(const eff of G.effects){const age=time-eff.born;
    if(eff.type==='miss'){if(age>800)continue;const prog=age/800,alpha=1-prog,yOff=prog*30;
      const hImg=sI('hit0');if(hImg){ctx.save();ctx.globalAlpha=alpha;ctx.translate(eff.x,eff.y+yOff);ctx.rotate(eff.angle);
        const sz=50;ctx.drawImage(hImg,-sz/2,-sz/2,sz,sz);ctx.restore()}active.push(eff)}
    else if(eff.type==='score'){if(age>700)continue;const stay=300,fade=400;let alpha,scale;
      if(age<stay){alpha=1;scale=1}else{const fp=(age-stay)/fade;alpha=1-fp;scale=1+fp*0.6}
      const hImg=sI(eff.img);if(hImg){ctx.save();ctx.globalAlpha=alpha;ctx.translate(eff.x,eff.y);ctx.scale(scale,scale);const sz = 45;const ratio = hImg.width / hImg.height; const w = sz * ratio;const h = sz;ctx.drawImage(hImg, -w/2, -h/2, w, h);ctx.restore();}active.push(eff)}}
  const activeBursts=[];for(const b of(G.sliderBurstEffects||[])){const age=time-b.born;if(age>300)continue;const prog=age/300;
    ctx.save();ctx.globalAlpha=(1-prog)*0.5;ctx.beginPath();ctx.arc(b.x,b.y,b.startR+prog*60,0,Math.PI*2);
    ctx.lineWidth=2;ctx.strokeStyle='rgba(255,255,255,0.8)';ctx.stroke();ctx.restore();activeBursts.push(b)}
  G.sliderBurstEffects=activeBursts;G.effects=active}

function numToImagesHTML(text, height = 30) {
  return String(text).split('').map(char => {
    if (isNaN(parseInt(char))) {return `<span style="font-size:${height*0.8}px; vertical-align:middle; margin:0 2px;">${char}</span>`;}
    const img = Skin.img['default-' + char];
    if (img && img.src) {return `<img src="${img.src}" style="height:${height}px; vertical-align:middle; margin:0 2px; pointer-events:none;">`;}
    return char;
  }).join('');
}

function updateHUD(){
  ghudScore.innerHTML = numToImagesHTML(String(G.score).padStart(8,'0'), 40);
  ghudComboNum.innerHTML = numToImagesHTML(G.combo, 50);
  const total = G.hits[300] + G.hits[100] + G.hits[50] + G.hits.miss;
  const acc = total > 0 ? (G.hits[300]*300 + G.hits[100]*100 + G.hits[50]*50) / (total*300) * 100 : 100;
  ghudAccuracy.innerHTML = numToImagesHTML(acc.toFixed(2) + '%', 24); const progress=Math.max(0,Math.min(1,G.time/(G.bm.stats.lastObjectTime||1)));
  const ring=document.getElementById('progressRing'),rc=ring.getContext('2d'),s=54,c=s/2,rr=21;rc.clearRect(0,0,s,s);
  rc.beginPath();rc.arc(c,c,rr,0,Math.PI*2);rc.lineWidth=2.5;rc.strokeStyle='rgba(255,255,255,0.9)';rc.stroke();
  if(progress>0){rc.save();rc.globalAlpha=0.5;rc.beginPath();rc.moveTo(c,c);rc.arc(c,c,rr,-Math.PI/2,-Math.PI/2+progress*Math.PI*2);
    rc.closePath();rc.fillStyle='#fff';rc.fill();rc.restore()}
  rc.beginPath();rc.arc(c,c,2.5,0,Math.PI*2);rc.fillStyle='rgba(255,255,255,0.9)';rc.fill()}

function endGame(){G.state='ended';cancelAnimationFrame(G.animFrame);try{G.audioSource.stop()}catch(e){}
  const total=G.hits[300]+G.hits[100]+G.hits[50]+G.hits.miss;
  const acc=total>0?(G.hits[300]*300+G.hits[100]*100+G.hits[50]*50)/(total*300)*100:0;
  const ratio300=total>0?G.hits[300]/total:0;
  const ratio50=total>0?G.hits[50]/total:0;
  const noMiss=G.hits.miss===0;
  let grade='D';
  if(ratio300===1) grade='X';
  else if(ratio300>0.9&&ratio50<0.01&&noMiss) grade='S';
  else if((ratio300>0.8&&noMiss)||ratio300>0.9) grade='A';
  else if((ratio300>0.7&&noMiss)||ratio300>0.8) grade='B';
  else if(ratio300>0.6) grade='C';
  const m=G.bm.metadata;document.getElementById('rpSong').innerHTML=esc(m.artistUnicode||m.artist)+' - '+esc(m.titleUnicode||m.title)+' ['+esc(m.version)+']';
  document.getElementById('rpMapper').textContent='Beatmap by '+m.creator;
  document.getElementById('rpScore').innerHTML = numToImagesHTML(String(G.score).padStart(8,'0'), 50);
  document.getElementById('rpHits').innerHTML=
    hitRow('#64b5f6','300',G.hits[300])+hitRow('#ffd700','激',G.hits.geki)+
    hitRow('#66bb6a','100',G.hits[100])+hitRow('#8888ff','喝',G.hits.katu)+
    hitRow('#ffd54f','50',G.hits[50])+hitRow('#ef5350','Miss',G.hits.miss);
  document.getElementById('rpCombo').innerHTML = numToImagesHTML(G.maxCombo + 'x', 30);document.getElementById('rpAcc').innerHTML = numToImagesHTML(acc.toFixed(2) + '%', 30);
  const ge=document.getElementById('rpGrade');
  const gradeImg=sI('ranking-'+grade);
  if(gradeImg&&gradeImg.src){
    ge.innerHTML=`<img src="${gradeImg.src}" style="height:180px;pointer-events:none;">`;
    ge.className='rp-grade';
  }else{
    ge.textContent=grade;ge.className='rp-grade '+grade;
  }
  const bgUrl=G.bm.events.background?G.bm._folder+'/'+G.bm.events.background:'';
  document.getElementById('rpRight').style.backgroundImage=bgUrl?`url('${bgUrl}')`:'none';resultsOverlay.classList.remove('hidden')}
function hitRow(c, l, n) {
  const imgMap = {'300':'hit300','激':'hit300g','100':'hit100','喝':'hit100k','50':'hit50','Miss':'hit0'};
  const imgName = imgMap[l];
  const img = imgName ? sI(imgName) : null;
  let badge;
  if (img && img.src) {
    badge = `<img src="${img.src}" style="height:28px;vertical-align:middle;pointer-events:none;">`;
  } else {
    badge = `<div class="rp-hit-badge" style="background:${c};color:#fff">${l}</div>`;
  }
  return `<div class="rp-hit">${badge}<span class="rp-hit-count">${n}x</span></div>`;
}

function exitGame(){G.state='list';cancelAnimationFrame(G.animFrame);
  document.querySelector('.site-footer').style.display='';
  try{if(G.audioSource)G.audioSource.stop()}catch(e){}try{if(G.audioCtx)G.audioCtx.close()}catch(e){}
  G.audioCtx=null;G.audioSource=null;G.audioBuffer=null;G.bgImage=null;
  const vEl=document.getElementById('bgVideo');vEl.pause();vEl.style.opacity='0';vEl.removeAttribute('src');G.bgVideo=null;
  gameScreen.classList.add('hidden');resultsOverlay.classList.add('hidden');pauseOverlay.classList.add('hidden');gamePrompt.classList.add('hidden');
  document.getElementById('topBar').style.display='';
  document.querySelectorAll('.sg-card.selected,.diff-card.selected').forEach(el=>el.classList.remove('selected'));
  document.querySelectorAll('.diff-list.expanded').forEach(el=>el.classList.remove('expanded'));
  document.querySelectorAll('.sg-arrow.open').forEach(el=>el.classList.remove('open'));
  hideInfoPanel();selectedDiff=null;expandedGroup=-1}

function resizeCanvas(){const W=window.innerWidth,H=window.innerHeight;G.canvas.width=W;G.canvas.height=H;
  const sx=W/512,sy=H/384;G.scale=Math.min(sx,sy)*.85;G.offX=(W-512*G.scale)/2;G.offY=(H-384*G.scale)/2}
window.addEventListener('resize',()=>{if(G.state!=='list')resizeCanvas()});

gameCanvas.addEventListener('mousedown',e=>{if(G.state==='ready'){startPlaying();return}if(G.state!=='playing')return;G.mouseDown=true;
  G.pendingClicks.push({x:e.clientX,y:e.clientY,time:G.time})});
gameCanvas.addEventListener('mouseup',()=>{G.mouseDown=false});
gameCanvas.addEventListener('touchstart',e=>{e.preventDefault();if(G.state==='ready'){startPlaying();return}if(G.state!=='playing')return;G.mouseDown=true;
  for(const t of e.changedTouches){G.pendingClicks.push({x:t.clientX,y:t.clientY,time:G.time})}},{passive:false});
gameCanvas.addEventListener('touchend',()=>{G.mouseDown=false});
document.addEventListener('keydown',e=>{if(e.key==='`'&&G.state==='playing')G.quickRestartActive=true;
  if(G.state==='ready'&&(e.key==='z'||e.key==='x'||e.key===' ')){startPlaying();return}
  if(e.key==='Escape'){if(G.state==='playing')pauseGame();else if(G.state==='paused')resumeGame();return}
  if(G.state!=='playing')return;if(e.key==='z'||e.key==='x'){G.mouseDown=true;Cursor.down=true;Cursor.ripples.push({x:Cursor.mx,y:Cursor.my,t:performance.now()});
    G.pendingClicks.push({x:G.mouseX,y:G.mouseY,time:G.time})}});
document.addEventListener('keyup',e=>{if(e.key==='z'||e.key==='x')G.mouseDown=false;Cursor.down=false;
  if(e.key==='`'){G.quickRestartActive=false;G.quickRestartProgress=0}});
document.addEventListener('mousemove',e=>{G.mouseX=e.clientX;G.mouseY=e.clientY});
document.addEventListener("click",()=>{
  initHitSounds()
},{once:true})
document.querySelectorAll('.pause-btn').forEach(btn=>{
        btn.addEventListener('mouseenter',()=>playHS('menuclick',0.3))
      })
gamePrompt.addEventListener('click',()=>{if(G.state==='ready')startPlaying()});
init();
</script>
